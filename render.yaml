services:
  # ── Backend API Service ────────────────────────────────────────
  - type: web
    name: fraudguard-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENVIRONMENT
        value: production
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fraudguard-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: fraudguard-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://fraudguard-frontend.onrender.com
    healthCheckPath: /health

  # ── Frontend Static Site ───────────────────────────────────────
  - type: web
    name: fraudguard-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://fraudguard-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  # ── PostgreSQL ─────────────────────────────────────────────────
  - name: fraudguard-db
    databaseName: fraudguard
    user: fraudguard_user
    plan: free
